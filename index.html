<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src = "script.js"></script>
</head>
<body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;
    filterMinCF: 0.001;
    filterBeta: 0.01;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" renderer="stencil: true">

        <a-assets>
        <img id="card" src="./Test.png" />
        <img id="bg" src="./1.png" />
        <img id="fade" src="./2.png" />
        <img id="grid" src="./3.png" />
        <img id="chara" src="./4.png" />

        <!-- assets para el robos -->
        <img id="frame1" src="./Robos/frame1.png" />
        <img id="frame2" src="./Robos/frame2.png" />
        <img id="frame4" src="./Robos/frame4.png" />
        </a-assets>



        <a-assets>
        <img id="lamp1" src="./Lampara/C1.png">
        <img id="lamp2" src="./Lampara/C2.png">
        <img id="lamp3" src="./Lampara/C3.png">
        <img id="lamp4" src="./Lampara/C4.png">
        <img id="lamp5" src="./Lampara/C6.png">
        </a-assets>


        <a-assets>
        <video id="test"
                src="./Test.webm"
                loop
                muted
                playsinline
                crossorigin="anonymous">
        </video>
        <video id="robos"
                src="./Robos/Romi.webm"
                loop
                muted
                playsinline
                crossorigin="anonymous">
        </video>
        </a-assets>

        <!-- assets para el tipo con aura -->
        <a-assets>
        <img id="sujeto" src="./Aura/7.png" />
        <img id="b1" src="./Aura/B1.png" />
        <img id="b1b" src="./Aura/B1-back.png" />
        <img id="b2" src="./Aura/B2.png" />  
        <img id="b3" src="./Aura/B3.png" />  
        </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- este target es la imagen de test en el documento -->
      <a-entity mindar-image-target="targetIndex: 0" smooth-follow>
       <a-plane src="#bg" position="0 0 -0.12" height="1" width="1"
                material="transparent: true" render-order="0"></a-plane>

        <a-plane src="#fade" position="0 0 -0.11" height="1" width="1"
                material="transparent: true; alphaTest: 0.01" render-order="1" ></a-plane>

        <a-plane src="#grid" position="0 0 -0.1" height="1" width="1"
                material="transparent: true; alphaTest: 0.01" render-order="2"></a-plane>

        <a-plane src="#chara" position="0 0 0.02" height="1" width="1" 
        material="color: black; transparent: true; opacity: 0.35; depthWrite: false;" fake-shadow="intensity: 0.06" view-parallax="intensity: 0.25; rotIntensity: 3"></a-plane>

        <a-plane src="#chara" position="0 0 0.3" height="1" width="1"
                material="transparent: true" render-order="3" view-parallax="intensity: 0.25; rotIntensity: 3"></a-plane>
        </a-entity>

        <!-- este target es el robos -->
        <a-entity id="cardTarget" mindar-image-target="targetIndex: 1" smooth-follow  ar-video="video: #robos">
                <a-plane src="#frame1" position="0 0 0" height="1" width="1"
                material="shader: holofoil-distort; map: #frame1; transparent: true" render-order="0" view-parallax="intensity: 0.1; rotIntensity: 3"></a-plane>

                <a-plane src="#frame2" position="0 0 0.02" height="1" width="1"
                material="shader: holofoil-distort; map: #frame2; transparent: true" render-order="1" uv-parallax="strength=0.01" view-parallax="intensity: 0.1; rotIntensity: 3"></a-plane>
                
                <a-video src="#robos" position="0 0 0.1" height="1" width="1" render-order="2" 
                material="color: black; transparent: true; opacity: 0.35; depthWrite: false;" fake-shadow="intensity: 0.06"
                view-parallax="intensity: 0.25; rotIntensity: 4"></a-video>
                
                <a-video src="#robos" position="0 0 0.15" height="1" width="1" render-order="3"
                material="transparent: true; depthWrite: false" view-parallax="intensity: 0.25; rotIntensity: 4"></a-video>
                
                <a-plane src="#frame4" position="0 0 0.20" height="1" width="1"
                material="transparent: true" render-order="4" view-parallax="intensity: 0.1; rotIntensity: 3"></a-plane>

                <a-entity position="-0.6 0.5 0.5" scale="0.7 0.7 1"  view-parallax="intensity: 0.1; rotIntensity: 2">
                        <a-plane src="#lamp4" position="0 0 0" height="1" width="1"
                        material="transparent: true" render-order="3">
                        </a-plane>  
                        <a-plane src="#lamp3" position="0 0 0" height="1" width="1"
                        material="transparent: true" render-order="2">
                        </a-plane>  
                        <a-plane src="#lamp2" position="0 0 0" height="1" width="1"
                        material="transparent: true" render-order="1">
                        </a-plane>  
                        <a-plane src="#lamp1" position="0 0 0" height="1" width="1"
                        material="transparent: true" render-order="0">
                        </a-plane>
                        <a-plane src="#lamp5" position="0 0.05 0.02" height="1" width="1" 
                        material="color: black; transparent: true; opacity: 0.35; depthWrite: false; alphaTest:0.3"
                        render-order="3"
                        fake-shadow="intensity: 0.06">
                        </a-plane>
                </a-plane>  
                </a-entity>     

        </a-entity>

        <!-- este target es el tipo que farmea aura -->
        <a-entity id="cardTarget" mindar-image-target="targetIndex: 2" smooth-follow>

                <a-plane src="#b3" position="0 0 -0.1" height="1" width="1"
                material="transparent: true" 
                view-parallax="intensity: 0.1; rotIntensity: 3"></a-plane>

                <a-plane src="#b2" position="0 0 -0.05" height="1" width="1"
                material="transparent: true;"  
                view-parallax="intensity: 0.1; rotIntensity: 3"></a-plane>


                <a-entity id="cardTarget" view-parallax="intensity: 0.25; rotIntensity: 4">

                        
                        <a-plane src="#b1" width="1" height="1" position="0 0 0.01" scale="1, 1, 1"
                        stencil-write
                        material="transparent:true">
                        </a-plane>
                
                        <a-plane src="#sujeto" position="0 0.05 0.02" height="1" width="1" 
                        material="color: black; transparent: true; opacity: 0.35; depthWrite: false; alphaTest:0.3"
                        render-order="3"
                        fake-shadow="intensity: 0.06">
                        </a-plane>

                        <a-plane src="#sujeto" width="1" height="1" position="0 0 0.02"
                        material="transparent:true; depthWrite:true">
                        </a-plane>

                        <a-plane src="#b1b" width="1" height="1" position="0 0 0.02"
                        material="transparent:true; depthWrite:true">
                        </a-plane>

                </a-entity>
        </a-entity>

 </a-scene>


<script>
        AFRAME.registerComponent("ar-video", {
        schema: {
        video: { type: "selector" }
        },

        init: function () {
        const video = this.data.video;
        const el = this.el;

        if (!video) return;

        const playVideo = () => {
        video.currentTime = 0;
        video.playbackRate = 1;

        const promise = video.play();
        if (promise !== undefined) {
                promise.catch(() => {
                console.log("Autoplay bloqueado, esperando interacción...");
                });
        }
        };

        const pauseVideo = () => {
        video.pause();
        };

        el.addEventListener("targetFound", playVideo);
        el.addEventListener("targetLost", pauseVideo);

        // desbloqueo de autoplay en móviles
        const unlock = () => {
        video.play().then(() => video.pause()).catch(() => {});
        document.body.removeEventListener("click", unlock);
        };

        document.body.addEventListener("click", unlock);
        }
        });
</script>


</body>
</html>
